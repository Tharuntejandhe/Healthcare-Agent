# Local full-stack dev/testing. Production deploys to Vercel (frontend) +
# Render (backend) + Neon (Postgres) — see render.yaml and DEPLOY.md.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medi
      POSTGRES_PASSWORD: medi
      POSTGRES_DB: medihealth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://medi:medi@db:5432/medihealth
      DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      # Named volume preserves the image's appuser ownership (non-root container).
      - medidata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  medidata:
